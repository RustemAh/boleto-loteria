<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados Lotería - Epicentro Chile</title>
    <style>
        :root { --azul: #003b8e; --rojo: #e74c3c; --dorado: #ffd400; --fondo: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--fondo); margin: 0; padding: 0; color: #333; }
        
        .header { background: linear-gradient(135deg, var(--azul) 0%, #0056b3 100%); color: white; text-align: center; padding: 40px 20px; border-bottom: 5px solid #00265d; }
        .container { max-width: 700px; margin: -40px auto 40px; padding: 0 15px; }
        
        .card { background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); padding: 25px; margin-bottom: 20px; }
        
        /* Buscador */
        .search-container { border: 2px solid var(--azul); }
        .search-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-top: 10px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; text-align: center; }
        button { background: var(--azul); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Pantalla de Resultado Individual */
        #resultadoPrivado { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; border: 2px dashed var(--azul); }

        /* Lista General de Resultados */
        .tabla-resultados { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .tabla-resultados th { background: #eee; padding: 10px; text-align: left; border-bottom: 2px solid #ddd; }
        .tabla-resultados td { padding: 10px; border-bottom: 1px solid #eee; }
        .monto-celda { font-weight: bold; color: var(--azul); text-align: right; }

        /* Premio Mayor Destacado */
        .mayor-box { text-align: center; border-bottom: 2px solid #f0f0f0; margin-bottom: 20px; padding-bottom: 20px; }
        .monto-grande { font-size: 2.5rem; font-weight: 900; color: var(--rojo); margin: 5px 0; }
        .num-grande { background: var(--azul); color: white; padding: 5px 25px; border-radius: 50px; font-size: 1.8rem; display: inline-block; }

        @media (max-width: 500px) { .search-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header class="header">
    <h1 id="sorteo-txt" style="margin:0;">Cargando Sorteo...</h1>
    <p id="fecha-txt" style="opacity: 0.9;">Esperando datos de Lotería</p>
</header>

<div class="container">
    <div class="card search-container">
        <div style="font-weight: bold; color: var(--azul); text-align: center;">VERIFICADOR DE BOLETO</div>
        <div class="search-grid">
            <input type="number" id="inNum" placeholder="Número">
            <input type="number" id="inVig" placeholder="Vigésimo">
            <button onclick="buscarBoleto()">VERIFICAR</button>
        </div>
        <div id="resultadoPrivado"></div>
    </div>

    <div class="card">
        <div class="mayor-box">
            <span style="font-size: 12px; font-weight: bold; color: #777;">PREMIO MAYOR</span>
            <div class="monto-grande" id="txtMontoMayor">$0</div>
            <div class="num-grande" id="txtNumMayor">00000</div>
        </div>

        <h3 style="color: var(--azul); border-left: 4px solid var(--dorado); padding-left: 10px;">Lista Oficial de Premios</h3>
        <table class="tabla-resultados">
            <thead>
                <tr>
                    <th>Número</th>
                    <th>Vig.</th>
                    <th style="text-align: right;">Premio Líquido</th>
                </tr>
            </thead>
            <tbody id="listaCompleta">
                </tbody>
        </table>
    </div>
</div>

<script>
    const SHEET_ID = "1jmqgDAU1HcTyT8zGqHacljhfn_WlN_pVjgyyonPEsXk";
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    let DATA = null;

    fetch(URL).then(res => res.text()).then(text => {
        const json = JSON.parse(text.match(/setResponse\(([\s\S]*?)\);?\s*$/)[1]);
        const r = json.table.rows[json.table.rows.length - 1].c;

        DATA = {
            fecha: r[0].f || r[0].v,
            sorteo: r[1].v,
            numMayor: r[2].v.toString(),
            montoMayor: r[3].v,
            vigesimos_raw: r[7] ? r[7].v.toString() : ""
        };

        renderPortal();
    });

    function renderPortal() {
        document.getElementById('sorteo-txt').innerText = "Sorteo N° " + DATA.sorteo;
        document.getElementById('fecha-txt').innerText = DATA.fecha;
        document.getElementById('txtMontoMayor').innerText = DATA.montoMayor;
        document.getElementById('txtNumMayor').innerText = DATA.numMayor;

        // Generar la lista completa de la tabla
        const tbody = document.getElementById('listaCompleta');
        const filas = DATA.vigesimos_raw.split(';');
        
        let htmlTabla = "";
        filas.forEach(f => {
            if(f.includes('-') && f.includes(':')) {
                const [comb, monto] = f.split(':');
                const [num, vig] = comb.split('-');
                htmlTabla += `<tr>
                    <td><strong>${num}</strong></td>
                    <td>${vig}</td>
                    <td class="monto-celda">$${monto}</td>
                </tr>`;
            }
        });
        tbody.innerHTML = htmlTabla;
    }

    function buscarBoleto() {
        const n = document.getElementById('inNum').value.trim();
        const v = document.getElementById('inVig').value.trim();
        const res = document.getElementById('resultadoPrivado');
        if(!n || !v) return;

        res.style.display = "block";
        const llave = `${n}-${v}`;
        const filas = DATA.vigesimos_raw.split(';');
        let premio = null;

        for(let f of filas) {
            const [c, m] = f.split(':');
            if(c.trim() === llave) { premio = m; break; }
        }

        if(premio) {
            res.style.borderColor = "var(--azul)";
            res.innerHTML = `¡GANASTE!<br>Tu número ${n} (Vig. ${v}) tiene un premio de $${premio}`;
        } else if(n === DATA.numMayor) {
            res.style.borderColor = "var(--dorado)";
            res.innerHTML = `¡PREMIO MAYOR!<br>Tu número ${n} es el ganador principal.`;
        } else {
            res.style.borderColor = "#f8d7da";
            res.innerHTML = "No se registran premios para esta combinación.";
        }
    }
</script>
</body>
</html>
